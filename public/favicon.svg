<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#667eea" opacity="0.1"/>
  
  <!-- Three blockchain blocks -->
  <!-- Left block -->
  <rect x="10" y="35" width="22" height="22" fill="#667eea" stroke="#764ba2" stroke-width="2" rx="3"/>
  <text x="21" y="50" font-size="12" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">◆</text>
  
  <!-- Middle block -->
  <rect x="39" y="20" width="22" height="22" fill="#764ba2" stroke="#667eea" stroke-width="2" rx="3"/>
  <text x="50" y="35" font-size="12" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">◆</text>
  
  <!-- Right block -->
  <rect x="68" y="35" width="22" height="22" fill="#667eea" stroke="#764ba2" stroke-width="2" rx="3"/>
  <text x="79" y="50" font-size="12" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">◆</text>
  
  <!-- Chain links between blocks -->
  <line x1="32" y1="43" x2="39" y2="35" stroke="#764ba2" stroke-width="2"/>
  <line x1="61" y1="28" x2="68" y2="38" stroke="#764ba2" stroke-width="2"/>
  
  <!-- Lock symbol for security -->
  <g transform="translate(50, 65)">
    <rect x="-8" y="-5" width="16" height="13" fill="none" stroke="#667eea" stroke-width="1.5" rx="2"/>
    <circle cx="0" cy="-3" r="5" fill="none" stroke="#667eea" stroke-width="1.5"/>
    <line x1="-2" y1="3" x2="-2" y2="6" stroke="#667eea" stroke-width="1"/>
    <line x1="2" y1="3" x2="2" y2="6" stroke="#667eea" stroke-width="1"/>
  </g>
</svg>